<body>

<div class="container">
    <h1>مستخرج هيكل ملفات ZIP المتصل 📂</h1>

    <div class="upload-box" id="dropZone">
        <p id="uploadText">اسحب ملف الـ ZIP هنا أو اضغط للتصفح</p>
        <span>يدعم الملفات المضغوطة بامتداد .zip فقط</span>
        <input type="file" id="zipInput" accept=".zip">
    </div>

    <button id="downloadBtn" class="btn">تحميل الشجرة كـ ملف نصي (TXT)</button>
    
    <div class="output-wrapper">
        <pre id="output">شجرة هيكل الملفات ستظهر هنا بمجرد رفع الملف...</pre>
